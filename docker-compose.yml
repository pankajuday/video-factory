services:
  api:
    build: ./api
    container_name: vf_api
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env.docker
    volumes:
      - media:/media
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  worker:
    build: ./worker
    container_name: vf_worker
    env_file:
      - ./worker/.env.docker
    volumes:
      - media:/media
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  web:
    build: ./web
    container_name: vf_web
    ports:
      - "3000:3000"
    restart: unless-stopped

  mongodb:
    image: mongo
    # ports:
    #   - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  
volumes:
  mongo_data:
  redis_data:
  media: